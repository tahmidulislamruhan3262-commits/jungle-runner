<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Ninja Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #011627; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background: linear-gradient(to bottom, #010c15 0%, #0d2c47 100%); }
        #scoreBoard {
            position: absolute; top: 20px; left: 20px;
            color: #00d2ff; font-size: 28px; font-weight: bold;
            text-shadow: 0 0 10px #00d2ff;
        }
    </style>
</head>
<body>

<div id="scoreBoard">SCORE: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameSpeed = 6;
    let isGameOver = false;
    const gravity = 0.7;

    const ninja = {
        x: 60,
        y: canvas.height - 150,
        w: 50,
        h: 80,
        dy: 0,
        jumpForce: 16,
        onGround: false,
        isSliding: false,
        slideTimer: 0
    };

    let obstacles = [];

    // Touch Swipe Controls
    let startY = 0;
    window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        let diff = startY - e.changedTouches[0].clientY;
        if (diff > 40 && ninja.onGround) {
            ninja.dy = -ninja.jumpForce;
            ninja.onGround = false;
        } else if (diff < -40 && ninja.onGround) {
            ninja.isSliding = true;
            ninja.slideTimer = 30;
        }
    });

    function spawnObstacle() {
        let type = Math.random() > 0.5 ? 'LOW' : 'HIGH';
        obstacles.push({
            x: canvas.width,
            y: type === 'HIGH' ? canvas.height - 180 : canvas.height - 110,
            w: 50,
            h: 40,
            type: type
        });
    }

    let timer = 0;
    function animate() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground
        ctx.fillStyle = "#0d2c47";
        ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
        ctx.strokeStyle = "#00d2ff";
        ctx.lineWidth = 3;
        ctx.strokeRect(0, canvas.height - 60, canvas.width, 2);

        // Ninja Physics
        ninja.dy += gravity;
        ninja.y += ninja.dy;

        if (ninja.y + ninja.h > canvas.height - 60) {
            ninja.y = canvas.height - 60 - ninja.h;
            ninja.dy = 0;
            ninja.onGround = true;
        }

        if (ninja.isSliding) {
            ninja.slideTimer--;
            if (ninja.slideTimer <= 0) ninja.isSliding = false;
        }

        // Draw Ninja as a Shadow Warrior (Not a box!)
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00d2ff";
        ctx.fillStyle = "#000";

        if (ninja.isSliding) {
            // Sliding shape
            ctx.beginPath();
            ctx.ellipse(ninja.x + 30, ninja.y + 60, 40, 20, 0, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // Standing Ninja Shadow
            ctx.fillRect(ninja.x, ninja.y, ninja.w, ninja.h);
            // Red Glowing Eyes
            ctx.shadowBlur = 5;
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(ninja.x + 35, ninja.y + 15, 8, 3);
        }
        ctx.restore();

        // Obstacles
        timer++;
        if (timer > 100) { spawnObstacle(); timer = 0; }

        obstacles.forEach((obs, i) => {
            obs.x -= gameSpeed;
            ctx.fillStyle = obs.type === 'HIGH' ? '#ff3e00' : '#7f8c8d';
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.shadowBlur = 0;

            let py = ninja.isSliding ? ninja.y + 40 : ninja.y;
            let ph = ninja.isSliding ? ninja.h - 40 : ninja.h;
            if (ninja.x < obs.x + obs.w && ninja.x + ninja.w > obs.x && py < obs.y + obs.h && py + ph > obs.y) {
                isGameOver = true;
                alert("Game Over! Score: " + score);
                location.reload();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score += 10;
                gameSpeed += 0.05;
            }
        });

        document.getElementById('scoreBoard').innerText = "SCORE: " + score;
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
