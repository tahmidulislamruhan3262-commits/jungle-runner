<!DOCTYPE html>
<html>
<head>
<title>Jungle Runner</title>
</head>

<body style="text-align:center; font-family:Arial">
<h2>Jungle Runner Game</h2>
<p>Jump করতে SPACE চাপো</p>

<canvas id="game" width="400" height="200" style="border:1px solid black"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player = {x:50,y:150,w:20,h:20,vy:0};
let gravity = 0.6;
let obstacle = {x:400,y:160,w:20,h:40};
let score = 0;

function draw(){
ctx.clearRect(0,0,400,200);

// Player physics
player.vy += gravity;
player.y += player.vy;
if(player.y>150){player.y=150;player.vy=0}

// Obstacle move
obstacle.x -= 4;
if(obstacle.x < -20){obstacle.x = 400; score++;}

// Draw
ctx.fillStyle = "green"; ctx.fillRect(player.x,player.y,player.w,player.h);
ctx.fillStyle = "brown"; ctx.fillRect(obstacle.x,obstacle.y,obstacle.w,obstacle.h);

// Score
ctx.fillStyle = "black";
ctx.fillText("Score: "+score,300,20);

// Collision
if(player.x < obstacle.x+obstacle.w &&
   player.x+player.w > obstacle.x &&
   player.y < obstacle.y+obstacle.h){
alert("Game Over! Score: "+score);
obstacle.x = 400; score=0;
}

requestAnimationFrame(draw);
}

// Jump
document.addEventListener("keydown",function(e){
if(e.code=="Space"){player.vy = -10;}
});

draw();
</script>

</body>
</html>
