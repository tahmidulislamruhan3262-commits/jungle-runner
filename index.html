<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Jungle Run PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #011627; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff9f43; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">SCORE: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Assets
    const bgImg = new Image();
    bgImg.src = 'https://img.freepik.com/free-vector/jungle-forest-game-background_107791-1773.jpg';

    let score = 0;
    let gameSpeed = 7;
    let isGameOver = false;
    let bgX = 0;

    const player = {
        x: 50, y: canvas.height - 150, w: 50, h: 80,
        dy: 0, jumpForce: 15, gravity: 0.6,
        onGround: false, isSliding: false, slideTimer: 0
    };

    let obstacles = [];

    // Inputs
    let startY = 0;
    window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        let diff = startY - e.changedTouches[0].clientY;
        if (diff > 30 && player.onGround) { // Jump
            player.dy = -player.jumpForce;
            player.onGround = false;
        } else if (diff < -30 && player.onGround) { // Slide
            player.isSliding = true;
            player.slideTimer = 30;
        }
    });

    function spawn() {
        let type = Math.random() > 0.5 ? 'ROCK' : 'TREE_BRANCH';
        obstacles.push({
            x: canvas.width,
            y: type === 'TREE_BRANCH' ? canvas.height - 180 : canvas.height - 100,
            w: 50, h: 40, type: type
        });
    }

    let timer = 0;
    function loop() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Jungle Background
        bgX -= gameSpeed * 0.5;
        if (bgX <= -canvas.width) bgX = 0;
        ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);

        // Ground
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

        // Player Physics
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y + player.h > canvas.height - 60) {
            player.y = canvas.height - 60 - player.h;
            player.dy = 0;
            player.onGround = true;
        }

        if (player.isSliding) {
            player.slideTimer--;
            if (player.slideTimer <= 0) player.isSliding = false;
        }

        // Draw Ninja Player
        ctx.fillStyle = "#2d3436"; // Black Ninja Shadow
        if (player.isSliding) {
            ctx.fillRect(player.x, player.y + 40, player.w + 20, player.h - 40);
        } else {
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "white"; // Ninja Headband
            ctx.fillRect(player.x + 30, player.y + 15, 20, 5);
        }

        // Obstacles
        timer++;
        if (timer > 100) { spawn(); timer = 0; }

        obstacles.forEach((obs, i) => {
            obs.x -= gameSpeed;
            ctx.fillStyle = obs.type === 'ROCK' ? '#636e72' : '#fab1a0';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Collision Detection
            let py = player.isSliding ? player.y + 40 : player.y;
            let ph = player.isSliding ? player.h - 40 : player.h;
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x && py < obs.y + obs.h && py + ph > obs.y) {
                isGameOver = true;
                alert("Game Over! Score: " + score);
                location.reload();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(i, 1);
                score += 10;
                gameSpeed += 0.1;
            }
        });

        document.getElementById('ui').innerText = "SCORE: " + score;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
