<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Runner | Endless Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        canvas { 
            display: block; 
            background: linear-gradient(#4facfe 0%, #00f2fe 100%); 
        }
        #scoreBoard {
            position: absolute; top: 20px; left: 20px;
            color: #fff; font-size: 28px; font-weight: 800;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        #gameOverOverlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); 
            color: #fff;
            padding: 40px 60px; 
            border-radius: 20px; 
            text-align: center;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #00f2fe;
        }
        h1 { font-size: 48px; margin-bottom: 10px; color: #ff4757; }
        p { font-size: 20px; margin-bottom: 20px; opacity: 0.9; }
        button {
            padding: 12px 30px;
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            background: #00f2fe;
            border: none; 
            color: #1a1a1a; 
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            background: #4facfe;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="scoreBoard">SCORE: 0</div>

<div id="gameOverOverlay">
    <h1>GAME OVER</h1>
    <p id="finalScoreDisplay"></p>
    <button onclick="resetGame()">Try Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreBoard');
    const overlay = document.getElementById('gameOverOverlay');
    const finalScoreText = document.getElementById('finalScoreDisplay');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let isGameRunning = true;
    let obstacles = [];
    let speed = 7;
    const gravity = 0.7;

    const player = {
        x: 80,
        y: canvas.height - 150,
        width: 50,
        height: 50,
        color: '#feca57', 
        dy: 0,
        jumpPower: 17,
        onGround: false
    };

    function handleInput() {
        if (player.onGround && isGameRunning) {
            player.dy = -player.jumpPower;
            player.onGround = false;
        }
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleInput(); });
    window.addEventListener('touchstart', handleInput);

    function createObstacle() {
        let h = 40 + Math.random() * 40;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - 60 - h,
            w: 35,
            h: h,
            color: '#ff6b6b'
        });
    }

    let frameCounter = 0;

    function gameLoop() {
        if (!isGameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Physics
        player.dy += gravity;
        player.y += player.dy;

        // Ground Collision
        if (player.y + player.height > canvas.height - 60) {
            player.y = canvas.height - 60 - player.height;
            player.dy = 0;
            player.onGround = true;
        }

        // Obstacle Logic
        frameCounter++;
        if (frameCounter > Math.max(60, 120 - speed * 3)) {
            createObstacle();
            frameCounter = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= speed;

            // Collision Detection
            if (
                player.x < o.x + o.w &&
                player.x + player.width > o.x &&
                player.y < o.y + o.h &&
                player.y + player.height > o.y
            ) {
                gameOver();
            }

            if (o.x + o.w < 0) {
                obstacles.splice(i, 1);
                score += 10;
                speed += 0.15; // Gradually gets harder
            }

            // Draw Obstacle
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x, o.y, o.w, o.h);
        }

        renderGraphics();
        scoreElement.innerText = "SCORE: " + score;
        requestAnimationFrame(gameLoop);
    }

    function renderGraphics() {
        // Draw Ground
        ctx.fillStyle = '#2d3436';
        ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
        
        // Draw Player (Panda placeholder)
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 10);
        ctx.fill();
    }

    function gameOver() {
        isGameRunning = false;
        overlay.style.display = 'block';
        finalScoreText.innerText = "Final Score: " + score;
    }

    function resetGame() {
        score = 0;
        obstacles = [];
        speed = 7;
        isGameRunning = true;
        overlay.style.display = 'none';
        gameLoop();
    }

    gameLoop();
</script>
</body>
</html>
