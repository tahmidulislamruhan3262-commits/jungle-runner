<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Human Runner 2026 | Pro Edition</title>
    <style>
        /* Professional Game Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #111; 
            font-family: 'Segoe UI', sans-serif; 
            user-select: none;
            touch-action: none;
        }
        canvas { 
            display: block; 
            background: linear-gradient(to bottom, #000428, #004e92); 
        }
        #game-ui {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            pointer-events: none;
        }
        .score-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 15px;
            border-left: 5px solid #00f2ff;
            backdrop-filter: blur(5px);
        }
        #score-val {
            color: #fff;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00f2ff;
        }
        #controls-hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="score-container">
        <div id="score-val">0000</div>
    </div>
</div>
<div id="controls-hint">Swipe Up: Jump | Swipe Down: Slide</div>
<canvas id="gameCanvas"></canvas>

<script>
    /** @type {HTMLCanvasElement} */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Global Settings
    let score = 0;
    let gameSpeed = 8;
    let isGameOver = false;
    let frame = 0;
    const gravity = 0.85;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Human Character Object
    const human = {
        x: 80,
        y: canvas.height - 180,
        width: 45,
        height: 95,
        baseHeight: 95,
        dy: 0,
        jumpForce: 18,
        onGround: false,
        isSliding: false,
        slideTimer: 0,
        animFrame: 0,

        update() {
            // Apply Physics
            this.dy += gravity;
            this.y += this.dy;

            // Ground Collision
            const groundY = canvas.height - 80;
            if (this.y + this.height > groundY) {
                this.y = groundY - this.height;
                this.dy = 0;
                this.onGround = true;
            }

            // Slide Logic
            if (this.isSliding) {
                this.slideTimer--;
                if (this.slideTimer <= 0) {
                    this.isSliding = false;
                    this.y -= 45; // Pop back up
                    this.height = this.baseHeight;
                }
            }
            
            this.animFrame += 0.15;
        },

        draw() {
            ctx.save();
            ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
            
            // Neon Glow Effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00f2ff";
            ctx.fillStyle = "#fff";

            if (this.isSliding) {
                // Drawing a sliding human silhouette
                ctx.beginPath();
                ctx.ellipse(0, 20, 45, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                // Head while sliding
                ctx.beginPath();
                ctx.arc(35, 15, 10, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Head
                ctx.beginPath();
                ctx.arc(0, -38, 12, 0, Math.PI * 2);
                ctx.fill();
                // Torso
                ctx.fillRect(-12, -26, 24, 42);
                
                // Animated Limbs (Hands/Legs)
                ctx.lineWidth = 7;
                ctx.strokeStyle = "#fff";
                ctx.lineCap = "round";
                
                let limbMove = Math.sin(this.animFrame) * 25;
                
                // Hands
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(limbMove, 5);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(-limbMove, 5);
                ctx.stroke();

                // Legs
                ctx.beginPath();
                ctx.moveTo(0, 15);
                ctx.lineTo(-limbMove, 45);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, 15);
                ctx.lineTo(limbMove, 45);
                ctx.stroke();
            }
            ctx.restore();
        }
    };

    // Obstacle Logic
    let obstacles = [];
    function spawnObstacle() {
        let isHigh = Math.random() > 0.5;
        // Adjusted height so it hits the head if not sliding
        let obsY = isHigh ? canvas.height - 180 : canvas.height - 125;
        
        obstacles.push({
            x: canvas.width,
            y: obsY,
            width: 60,
            height: 50,
            type: isHigh ? 'DANGER' : 'GROUND',
            color: isHigh ? '#ff3e00' : '#00f2ff'
        });
    }

    // Input Management
    let touchStart = 0;
    window.addEventListener('touchstart', e => touchStart = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        let move = touchStart - e.changedTouches[0].clientY;
        if (move > 45 && human.onGround) {
            human.dy = -human.jumpForce;
            human.onGround = false;
        } else if (move < -45 && human.onGround && !human.isSliding) {
            human.isSliding = true;
            human.height = 45;
            human.slideTimer = 35;
        }
    });

    // Game Loop
    function main() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;

        // 1. Draw Environment
        ctx.fillStyle = "#000";
        ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
        ctx.strokeStyle = "rgba(0, 242, 255, 0.5)";
        ctx.lineWidth = 4;
        ctx.strokeRect(0, canvas.height - 80, canvas.width, 2);

        // 2. Update & Draw Human
        human.update();
        human.draw();

        // 3. Manage Obstacles
        if (frame % Math.floor(110 - gameSpeed) === 0) spawnObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed;

            // Draw Obstacle
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = o.color;
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x, o.y, o.width, o.height);
            ctx.restore();

            // Precise Collision Detection
            let hitboxY = human.isSliding ? human.y + 40 : human.y;
            let hitboxH = human.isSliding ? human.height : human.height;

            if (human.x < o.x + o.width &&
                human.x + human.width > o.x &&
                hitboxY < o.y + o.height &&
                hitboxY + hitboxH > o.y) {
                isGameOver = true;
                alert("GAME OVER! \nYour Final Score: " + score);
                location.reload();
            }

            // Cleanup & Score
            if (o.x + o.width < 0) {
                obstacles.splice(i, 1);
                score += 100;
                gameSpeed += 0.1;
            }
        }

        document.getElementById('score-val').innerText = score.toString().padStart(4, '0');
        requestAnimationFrame(main);
    }

    main();
</script>
</body>
</html>
